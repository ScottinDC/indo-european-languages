<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test 02 — Design Assessment</title>
<style>
:root {
  --text-1: #1A1A1A;
  --text-3: #9A988F;
  --bg-1: #FFFFFF;
  --bg-2: #EEEDE9;
  --border: #E4E2DC;
  --indigo: #4338CA;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg-2);
  color: var(--text-1);
  display: flex;
  flex-direction: column;
  min-height: 100%;
}
header {
  flex: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 20px;
  background: var(--bg-1);
  border-bottom: 0.5px solid var(--border);
}
header h1 {
  margin: 0;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.2px;
}
header p {
  margin: 2px 0 0;
  font-size: 12px;
  color: var(--text-3);
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border-radius: 8px;
  border: 0.5px solid var(--border);
  background: var(--bg-1);
  color: var(--text-3);
  font: inherit;
  font-size: 12px;
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.btn:hover { background: #F7F6F3; color: var(--text-1); }
.preview-wrap {
  flex: 1;
  min-height: 0;
  background: #2e3a5e;
  padding: 16px;
}
.preview-frame {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 12px;
  background: #fff;
  box-shadow: 0 12px 40px -8px rgba(0,0,0,.35);
}
</style>
</head>
<body>
<header>
  <div>
    <h1>Test 02 — Indo-European Map</h1>
    <p>Interactive language-family map</p>
  </div>
  <div class="header-actions">
    <button class="btn" type="button" id="reload-btn">Reload</button>
    <a class="btn" href="./dist/index.html" target="_blank" rel="noopener">Open full screen</a>
  </div>
</header>

<div class="preview-wrap">
  <iframe
    id="preview"
    class="preview-frame"
    src="./dist/index.html"
    title="Test 02 design preview"
    allow="fullscreen">
  </iframe>
</div>

<script>
document.getElementById('reload-btn').addEventListener('click', () => {
  document.getElementById('preview').src = './dist/index.html?t=' + Date.now();
});
</script>
</body>
</html>
